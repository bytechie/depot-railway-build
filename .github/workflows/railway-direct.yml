# Flow 3: GitHub Actions → Railway (Baseline)
# This workflow represents the traditional CI/CD approach
# Used as a baseline to compare against Depot CI performance

name: Build & Deploy to Railway (Baseline)

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment to Railway'
        required: false
        type: boolean
        default: false
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false
      log_level:
        description: 'Log level'
        required: false
        type: choice
        default: 'info'
        options:
          - debug
          - info
          - warning
          - error

env:
  NODE_VERSION: '18'
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
  LOG_LEVEL: ${{ github.event.inputs.log_level || 'info' }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable debug logging
        if: github.event.inputs.debug_enabled == 'true'
        run: |
          echo "🐛 Debug mode enabled"
          echo "LOG_LEVEL=${{ env.LOG_LEVEL }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          npm ci
          echo "::endgroup::"

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build application
        run: |
          echo "::group::Building application"
          npm run build
          echo "::endgroup::"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sample-app/dist
          retention-days: 1

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    if: inputs.skip_deploy != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: sample-app/dist

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Deploying to Railway"
          cd sample-app
          railway up --service ${{ env.RAILWAY_SERVICE_ID }}
          echo "::endgroup::"

      - name: Get deployment URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Record Metrics
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Calculate workflow duration
        run: |
          START_TIME="${{ github.event.workflow_run.created_at }}"
          echo "Workflow started: $START_TIME"
          echo "This metrics collection would be enhanced with Depot CI"
