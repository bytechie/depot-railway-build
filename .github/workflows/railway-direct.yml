# Flow 3: GitHub Actions → Railway (Baseline)
# This workflow represents the traditional CI/CD approach
# Builds Docker image in GitHub Actions, then deploys to Railway
# Used as a baseline to compare against Depot CI performance

name: Build & Deploy to Railway (Baseline)

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment to Railway'
        required: false
        type: boolean
        default: false
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18'
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: openclaw-demo
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sample-app
          load: true  # Load into Docker daemon (not push)
          tags: ${{ steps.meta.outputs.tags }}
          cache: type=gha
          cache-from: type=gha
          cache-to: type=gha,mode=max
          annotations: |
            manifest:description:Built with GitHub Actions

      - name: Run tests in Docker image
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} npm test

      - name: Save Docker image
        run: |
          docker save ${{ steps.meta.outputs.tags }} | gzip > /tmp/docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: inputs.skip_deploy != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load < /tmp/docker-image.tar.gz

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Deploying Docker image to Railway"
          cd sample-app
          # Railway will build and deploy using the Dockerfile
          railway up --service ${{ env.RAILWAY_SERVICE_ID }}
          echo "::endgroup::"

      - name: Verify deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deployment URL:"
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Record Metrics
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Calculate workflow duration
        run: |
          echo "📊 GitHub Actions Baseline Metrics"
          echo "===================================="
          echo "Build job: ${{ needs.build.result }}"
          echo "Deploy job: ${{ needs.deploy.result }}"
          echo ""
          echo "🐌 Traditional CI:"
          echo "   - Docker build on ubuntu-latest"
          echo "   - GitHub Actions cache (layer caching)"
          echo "   - Image built locally, then deployed via Railway"
          echo ""
          echo "⚡ Compare with Depot CI for 5-10x speedup"
